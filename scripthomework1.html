<body>
    <h1>This is Pyae's Homework.</h1>

    <script>
        let number = parseInt(prompt('Enter'));

        if(number % 2 == 0){
            document.write('You Wrote Even Number!')
        }else if(number % 2 == 1){
            document.write('You Wrote Odd Number!')
        }else{
            document.write('You must write Number!')
        }
    </script>
