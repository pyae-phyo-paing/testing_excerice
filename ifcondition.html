<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>If Condition</h1>

    <script>
        
        let number = prompt("Enter Number");

        if(number < 100){
            document.write("Your Enter Number is less than 100!")
        }else if(number > 100){
            document.write("Your Enter Number is greater than 100!")
        }else if(number == 100){
            document.write("Your Enter Number is equal with 100!")
        }else{
            document.write("Your Enter Number is Empty!")
        }
    </script>
</body>
</html>
