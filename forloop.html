<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>For Loop Lesson</h1>

    <script>
        for(i = 0; i <= 10; i++){
            document.write(`<h1> Hello World ${i}! </h1>`);
        }

        let laptopLists = ['Acer','Dell','Lenovo','Hp'];

        for(let j = 0; j < laptopLists; j++){
            document.write(`<h1> ${laptopLists[j]} </h1>`);
        }

        for(let k = 1; k <= 12; k++){
            document.write(`<h1> 12 * ${k} = ${ k * 12} </h1>`);
        }

        for( let h = 0; h < 5; h++){
           for(let s = 0; s <= h; s++){
            document.write('*');
           }
           document.write('<br>');
        }
    </script>
</body>
</html>
