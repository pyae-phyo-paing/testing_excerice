<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Lesson</title>
</head>
<body>
    <h1>Student Registration</h1>

    <form action="request.php">
        <label for="name">Name</label>
        <input type="text" name="stu_name" id="name">
        <br><br>
        <label for="email">Email</label>
        <input type="email" name="stu_email" id="email">
        <br><br>
        <label for="password">Password</label>
        <input type="password" name="stu_password" id="password">
        <br><br>
        <label for="phone">Phone</label>
        <input type="number" name="stu_phone" id="phone">
        <br><br>
        <label for="dob">Date of Birth</label>
        <input type="date" name="stu_dob" id="dob">
        <br><br>
        <label for="passport">Passport</label>
        <input type="file" name="stu_passport" id="passport">
        <br><br>
        <label for="year">Year</label>
        <select name="student_year" id="year">
            <option value="0">Choose Year</option>
            <option value="1">First Year</option>
            <option value="2">Second Year</option>
            <option value="3">Third Year</option>
            <option value="4">Fourth Year</option>
        </select>
        <br><br>
        <label for="gender">Gender</label>
        <br><br>
        <input type="radio" name="student_gender" id="male"><label for="male">Male</label> 
        <input type="radio" name="student_gender" id="female"><label for="female">Female</label>
        <br><br>
        <label for="hobby">Hobby</label>
        <br><br>
        <input type="checkbox" name="student_hobby" id="movie"><label for="movie">Movie</label>
        <input type="checkbox" name="student_hobby" id="reading"><label for="reading">Reading</label>
        <input type="checkbox" name="student_hobby" id="listening"><label for="listening">Listening</label>
        <br><br>
        <label for="address">Address</label>
        <textarea name="stu_address" id="address" cols="30" rows="10"></textarea>
        <br><br>
        <input type="time">
        <br><br>
        <input type="datetime-local">
        <br><br>
        <input type="week">
        <br><br>
        <input type="color">
        <br><br>
        <input type="text" required>
        <br><br>
        <label for="old_stu_id">Old Student ID</label>
        <input type="number" placeholder="1234567">
        <br><br>
        <input type="text" placeholder="You are new." readonly>
        <br><br>
        <input type="text" disabled placeholder="New">
        <br><br>
        <button type="submit">Submit</button>
    </form>
</body>
</html>
