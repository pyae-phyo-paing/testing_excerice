<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Switch</h1>

    <script>
        let number = parseInt(prompt('Enter a Number!'));

        switch(number){

            case 1:
                document.write('Your Number is one.')
                break;

            case 2:
                document.write('Your Number is Two.')
                break;

            default:
                document.write('None of these.')
                break;
        }
    </script>
</body>
</html>
